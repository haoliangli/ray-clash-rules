name: secret-scan

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  allowlist-and-secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Enforce public surface and scan published files
        shell: bash
        run: |
          set -euo pipefail

          allowed_paths='^(\.github/workflows/secret-scan\.yml|\.gitignore|README\.md|fakeipfilter_domain\.list|user-acdemic-direct\.list|user-custom-direct\.list|user-custom-proxy\.list|user-custom-reject\.list)$'
          unexpected_paths="$(git ls-files | grep -Ev "${allowed_paths}" || true)"

          if [[ -n "${unexpected_paths}" ]]; then
            echo "Unexpected tracked paths in public rules repository:"
            echo "${unexpected_paths}"
            exit 1
          fi

          credential_pattern='(^|[,{[:space:]])(server|port|uuid|password|private-key|token|psk|short-id|public-key)[[:space:]]*:|(^|[[:space:]])(vless|vmess|trojan|hysteria|hysteria2|hy2|tuic|anytls|ss)://|[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'

          if git grep -nEI "${credential_pattern}" -- '*.list' 'README.md'; then
            echo "Credential-like content detected in a published file."
            exit 1
          fi

          echo "Public surface and credential scan passed."
